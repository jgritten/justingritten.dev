name: Deploy to S3 + CloudFront

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install (client)
        working-directory: client
        run: npm ci

      - name: Test (client)
        working-directory: client
        run: npm run test

  test-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Test (server)
        run: dotnet test server/Api.Tests/Api.Tests.csproj --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

  build-client:
    runs-on: ubuntu-latest
    needs: [test-client, test-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install (client)
        working-directory: client
        run: npm ci

      - name: Build (client)
        working-directory: client
        run: npm run build
        env:
          # Production API URL baked into the client at build time (Vite).
          # Set repo variable VITE_API_URL in Settings → Actions → Variables to override.
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://justingritten-api-dev.eba-vrsgy2gn.us-east-1.elasticbeanstalk.com' }}

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: error

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download client build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::305137865693:role/github-deploy-justingritten-dev
          aws-region: us-east-2

      # 1) Upload hashed assets with long cache headers
      - name: Deploy assets to S3 (long cache)
        run: |
          aws s3 sync ./client/dist/assets s3://justingritten.dev/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # 2) Upload other static files (icons, vite.svg, etc.) with a reasonable cache
      - name: Deploy static files to S3 (moderate cache)
        run: |
          aws s3 sync ./client/dist s3://justingritten.dev \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=86400"

      # 3) Upload index.html with no-cache so new deploys show immediately
      - name: Deploy index.html to S3 (no cache)
        run: |
          aws s3 cp ./client/dist/index.html s3://justingritten.dev/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # 4) Invalidate CloudFront to force refresh everywhere
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3D56KG355201F --paths "/*"

  deploy-api:
    runs-on: ubuntu-latest
    needs: [test-client, test-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::305137865693:role/github-deploy-justingritten-dev
          aws-region: us-east-2

      # 5) Deploy API to Elastic Beanstalk (us-east-1)
      - name: Publish API
        run: dotnet publish server/Api.csproj -c Release -o server/bin/Release/net10.0/publish

      - name: Zip API for EB
        run: |
          cd server/bin/Release/net10.0/publish
          zip -r ../publish.zip .
          cd -

      - name: Upload API bundle to S3 (for EB)
        env:
          EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET != '' && vars.EB_S3_BUCKET || 'elasticbeanstalk-us-east-1-305137865693' }}
          EB_VERSION_LABEL: api-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          aws s3 cp server/bin/Release/net10.0/publish.zip \
            "s3://$EB_S3_BUCKET/deployments/$EB_VERSION_LABEL.zip" \
            --region us-east-1

      - name: Deploy API to Elastic Beanstalk
        env:
          EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET != '' && vars.EB_S3_BUCKET || 'elasticbeanstalk-us-east-1-305137865693' }}
          EB_VERSION_LABEL: api-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name justingritten.dev.api \
            --version-label "$EB_VERSION_LABEL" \
            --source-bundle S3Bucket="$EB_S3_BUCKET",S3Key="deployments/$EB_VERSION_LABEL.zip" \
            --region us-east-1
          aws elasticbeanstalk update-environment \
            --application-name justingritten.dev.api \
            --environment-name justingritten-api-dev \
            --version-label "$EB_VERSION_LABEL" \
            --region us-east-1