name: Deploy to S3 + CloudFront

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install (client)
        working-directory: client
        run: npm ci

      - name: Test (client)
        working-directory: client
        run: npm run test

  test-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Test (server)
        run: dotnet test server/Api.Tests/Api.Tests.csproj --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

  build-client:
    runs-on: ubuntu-latest
    needs: [test-client, test-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install (client)
        working-directory: client
        run: npm ci

      - name: Build (client)
        working-directory: client
        run: npm run build
        env:
          # Production API URL baked into the client at build time (Vite).
          # Set repo variable VITE_API_URL in Settings → Actions → Variables to override.
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://api.justingritten.dev' }}

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: error

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-client

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download client build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::305137865693:role/github-deploy-justingritten-dev
          aws-region: us-east-2

      # 1) Upload hashed assets with long cache headers
      - name: Deploy assets to S3 (long cache)
        run: |
          aws s3 sync ./client/dist/assets s3://justingritten.dev/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # 2) Upload other static files (icons, vite.svg, etc.) with a reasonable cache
      - name: Deploy static files to S3 (moderate cache)
        run: |
          aws s3 sync ./client/dist s3://justingritten.dev \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=86400"

      # 3) Upload index.html with no-cache so new deploys show immediately
      - name: Deploy index.html to S3 (no cache)
        run: |
          aws s3 cp ./client/dist/index.html s3://justingritten.dev/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # 4) Invalidate CloudFront to force refresh everywhere
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3D56KG355201F --paths "/*"

  deploy-api:
    runs-on: ubuntu-latest
    needs: [test-client, test-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::305137865693:role/github-deploy-justingritten-dev
          aws-region: us-east-2

      # 5) Deploy API to Elastic Beanstalk (us-east-1)
      - name: Publish API
        run: dotnet publish server/Api.csproj -c Release -o server/bin/Release/net10.0/publish

      - name: Include EB deploy hooks (SQLite backup/restore)
        run: |
          mkdir -p server/bin/Release/net10.0/publish/.platform
          cp -R server/.platform/* server/bin/Release/net10.0/publish/.platform/
          chmod +x server/bin/Release/net10.0/publish/.platform/hooks/predeploy/*.sh

      - name: Zip API for EB
        run: |
          cd server/bin/Release/net10.0/publish
          zip -r ../publish.zip .
          cd -

      - name: Upload API bundle to S3 (for EB)
        env:
          EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET != '' && vars.EB_S3_BUCKET || 'elasticbeanstalk-us-east-1-305137865693' }}
          EB_VERSION_LABEL: api-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          aws s3 cp server/bin/Release/net10.0/publish.zip \
            "s3://$EB_S3_BUCKET/deployments/$EB_VERSION_LABEL.zip" \
            --region us-east-1

      - name: Deploy API to Elastic Beanstalk
        env:
          EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET != '' && vars.EB_S3_BUCKET || 'elasticbeanstalk-us-east-1-305137865693' }}
          EB_VERSION_LABEL: api-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          echo "DEPLOY_START_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          aws elasticbeanstalk create-application-version \
            --application-name justingritten.dev.api \
            --version-label "$EB_VERSION_LABEL" \
            --source-bundle S3Bucket="$EB_S3_BUCKET",S3Key="deployments/$EB_VERSION_LABEL.zip" \
            --region us-east-1
          aws elasticbeanstalk update-environment \
            --application-name justingritten.dev.api \
            --environment-name justingritten-api-dev \
            --version-label "$EB_VERSION_LABEL" \
            --region us-east-1

      - name: Verify EB deploy health and events
        env:
          EB_ENV_NAME: justingritten-api-dev
        run: |
          set -euo pipefail

          echo "Waiting for Elastic Beanstalk environment readiness..."
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=15
          READY_SEEN=0

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV_NAME" \
              --region us-east-1 \
              --query "Environments[0].Status" \
              --output text)

            HEALTH=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV_NAME" \
              --region us-east-1 \
              --query "Environments[0].Health" \
              --output text)

            echo "Attempt $i/$MAX_ATTEMPTS -> Status=$STATUS Health=$HEALTH"

            if [ "$STATUS" = "Ready" ] && { [ "$HEALTH" = "Green" ] || [ "$HEALTH" = "Ok" ]; }; then
              READY_SEEN=1
              break
            fi

            sleep "$SLEEP_SECONDS"
          done

          if [ "$READY_SEEN" -ne 1 ]; then
            echo "Environment did not become Ready with healthy status in time."
            aws elasticbeanstalk describe-events \
              --environment-name "$EB_ENV_NAME" \
              --region us-east-1 \
              --max-records 30
            exit 1
          fi

          echo "Waiting for post-deploy health stabilization (avoids transient warm-up 5xx)..."
          STABLE_POLLS_REQUIRED=6
          STABLE_POLLS=0
          for i in $(seq 1 36); do
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV_NAME" \
              --region us-east-1 \
              --query "Environments[0].Health" \
              --output text)
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV_NAME" \
              --region us-east-1 \
              --query "Environments[0].Status" \
              --output text)

            if [ "$STATUS" = "Ready" ] && { [ "$HEALTH" = "Green" ] || [ "$HEALTH" = "Ok" ]; }; then
              STABLE_POLLS=$((STABLE_POLLS + 1))
              echo "Stabilization poll $i/36 -> Status=$STATUS Health=$HEALTH (stable $STABLE_POLLS/$STABLE_POLLS_REQUIRED)"
              if [ "$STABLE_POLLS" -ge "$STABLE_POLLS_REQUIRED" ]; then
                break
              fi
            else
              STABLE_POLLS=0
              echo "Stabilization poll $i/36 -> Status=$STATUS Health=$HEALTH (reset stability counter)"
            fi
            sleep 10
          done

          if [ "$STABLE_POLLS" -lt "$STABLE_POLLS_REQUIRED" ]; then
            echo "Environment never reached sustained Ready/Green|Ok stabilization window."
            aws elasticbeanstalk describe-events \
              --environment-name "$EB_ENV_NAME" \
              --region us-east-1 \
              --max-records 30
            exit 1
          fi

          echo "Checking EB events for new ERROR/FATAL entries since deploy start: $DEPLOY_START_UTC"
          aws elasticbeanstalk describe-events \
            --environment-name "$EB_ENV_NAME" \
            --region us-east-1 \
            --max-records 100 \
            --output json > eb-events.json

          python3 -c "import json, os, sys; from datetime import datetime, timezone; \
          start_raw = os.environ.get('DEPLOY_START_UTC'); \
          start_dt = datetime.strptime(start_raw, '%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=timezone.utc) if start_raw else None; \
          assert start_dt is not None, 'DEPLOY_START_UTC is missing; failing deploy verification.'; \
          events = json.load(open('eb-events.json', 'r', encoding='utf-8')).get('Events', []); \
          bad = [e for e in events if e.get('Severity') in ('ERROR', 'FATAL') and e.get('EventDate') and datetime.fromisoformat(e.get('EventDate').replace('Z', '+00:00')) >= start_dt]; \
          print('No ERROR/FATAL EB events detected during this deploy window.') if not bad else print('Found ERROR/FATAL EB events during this deploy window:\\n' + '\\n'.join([f\"- [{e.get('EventDate')}] {e.get('Severity')}: {e.get('Message', '')}\" for e in bad])); \
          sys.exit(1 if bad else 0)"

          curl_with_retry() {
            local url="$1"
            local max_attempts="$2"
            local sleep_seconds="$3"
            local label="$4"

            for i in $(seq 1 "$max_attempts"); do
              if curl -fsS --max-time 20 "$url" >/dev/null; then
                echo "$label check passed on attempt $i/$max_attempts."
                return 0
              fi
              echo "$label check failed on attempt $i/$max_attempts; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done

            echo "$label check failed after $max_attempts attempts."
            return 1
          }

          echo "Resolving EB environment CNAME for direct origin health checks..."
          EB_CNAME=$(aws elasticbeanstalk describe-environments \
            --environment-names "$EB_ENV_NAME" \
            --region us-east-1 \
            --query "Environments[0].CNAME" \
            --output text)

          echo "Verifying direct EB origin health endpoint with retries..."
          curl_with_retry "http://$EB_CNAME/health" 18 10 "Direct origin"

          echo "Verifying public API endpoint with retries..."
          # CloudFront/custom-domain can briefly return 502 while edge/origin state converges.
          curl_with_retry "https://api.justingritten.dev/health" 18 10 "Public API"
          echo "Post-deploy health verification passed."