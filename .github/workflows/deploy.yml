name: Deploy to S3 + CloudFront

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install (client)
        working-directory: client
        run: npm ci

      - name: Test (client)
        working-directory: client
        run: npm run test

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test (server)
        run: dotnet test server/Api.Tests/Api.Tests.csproj --verbosity normal
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      - name: Build (client)
        working-directory: client
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::305137865693:role/github-deploy-justingritten-dev
          aws-region: us-east-2

      # 1) Upload hashed assets with long cache headers
      - name: Deploy assets to S3 (long cache)
        run: |
          aws s3 sync ./client/dist/assets s3://justingritten.dev/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # 2) Upload other static files (icons, vite.svg, etc.) with a reasonable cache
      - name: Deploy static files to S3 (moderate cache)
        run: |
          aws s3 sync ./client/dist s3://justingritten.dev \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=86400"

      # 3) Upload index.html with no-cache so new deploys show immediately
      - name: Deploy index.html to S3 (no cache)
        run: |
          aws s3 cp ./client/dist/index.html s3://justingritten.dev/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # 4) Invalidate CloudFront to force refresh everywhere
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3D56KG355201F --paths "/*"